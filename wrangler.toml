# Cloudflare Workers Static Assets config for the public landing page.
#
# This file is read by the Cloudflare "Connect to Git" flow (Workers +
# Pages unified dashboard). It tells Cloudflare to publish the contents
# of `./brand/` as static assets — no Worker code, no build step.
#
# Production URL is wired via the Cloudflare dashboard:
#   Workers & Pages → lumen-landing → Settings → Domains & Routes →
#   Add custom domain → lumen.quanla.org
#
# See brand/DEPLOY.md for the full setup walkthrough.

name = "mute-paper-e473"
compatibility_date = "2026-06-02"

[assets]
# Built output of `scripts/build-public-site.sh` — combines the
# landing page in brand/ and the Starlight docs build into one tree:
#
#   public-site/
#   ├── index.html        (landing — from brand/)
#   ├── logo*.svg, …      (brand assets)
#   └── docs/             (Starlight docs — built with base="/docs")
#
# Cloudflare's Connect-to-Git form needs `Build command:
# `bash scripts/build-public-site.sh`` to produce this directory
# before wrangler deploy publishes it.
directory = "./public-site"

# Behaviour when a requested path doesn't map to a file in the assets
# directory. `single-page-application` re-serves /index.html for any
# unmatched URL so the landing's anchor nav (#wedges, #install, …)
# always lands somewhere meaningful. Starlight's /docs/* routes are
# real files so they hit first; only typo'd top-level paths fall
# through to the SPA index.
not_found_handling = "single-page-application"
