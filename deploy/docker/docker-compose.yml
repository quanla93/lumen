# Lumen dev compose — 1-command end-to-end stack.
#
# From repo root:
#   docker compose -f deploy/docker/docker-compose.yml up --build
#
# Then open http://localhost:8090 to see the embedded web UI.

name: lumen

services:
  hub:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.hub
    image: lumen-hub:dev
    container_name: lumen-hub
    ports:
      - "8090:8090"
    # Single source of truth: the repo-root .env. Path is resolved
    # relative to THIS compose file, so any CWD works (no --env-file flag).
    # Missing .env is OK; the Go binary falls back to its own defaults.
    env_file:
      - path: ../../.env
        required: false
    environment:
      # Container-only overrides — keep these so a native-tuned .env
      # (LUMEN_HUB_URL=localhost, LUMEN_HUB_DB_PATH=./lumen.db) doesn't
      # break things inside the container.
      LUMEN_HUB_DB_PATH: "/data/lumen.db"
    volumes:
      - lumen-data:/data
    restart: unless-stopped

  # NOTE: Strict bearer-token auth. Without a valid LUMEN_AGENT_TOKEN
  # the hub returns 401 to every ingest until you:
  #   1. Sign in at http://localhost:8090 (seeded admin if
  #      LUMEN_HUB_ADMIN_* are set in .env; otherwise the UI will offer
  #      a register form).
  #   2. Settings → Hosts → Create → copy the one-shot `lum_...` token.
  #   3. Put LUMEN_AGENT_TOKEN=lum_... in .env, then:
  #        docker compose -f deploy/docker/docker-compose.yml up -d agent
  # The 401s are loud but harmless — the agent retries every interval.
  agent:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.agent
    image: lumen-agent:dev
    container_name: lumen-agent
    depends_on:
      - hub
    env_file:
      - path: ../../.env
        required: false
    environment:
      # Container-only override: agent reaches the hub via compose DNS.
      LUMEN_HUB_URL: "http://hub:8090"
    restart: unless-stopped

  # Second agent — opt-in via `--profile extra`. Workflow:
  #   1. Hub UI → Settings → Add host "compose-agent-2" → copy token.
  #   2. Append to .env:  LUMEN_AGENT_TOKEN_2=lum_xxx...
  #   3. docker compose -f deploy/docker/docker-compose.yml --profile extra up -d agent2
  agent2:
    profiles: ["extra"]
    image: lumen-agent:dev
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.agent
    container_name: lumen-agent-2
    depends_on:
      - hub
    env_file:
      - path: ../../.env
        required: false
    environment:
      LUMEN_HUB_URL: "http://hub:8090"
      LUMEN_AGENT_HOST: "compose-agent-2"
      # Interpolated from .env at compose time — empty → 401 from hub.
      LUMEN_AGENT_TOKEN: "${LUMEN_AGENT_TOKEN_2:-}"
    restart: unless-stopped

volumes:
  lumen-data:
