# Lumen dev compose — hub-only local stack.
#
# From repo root:
#   docker compose -f deploy/docker/docker-compose.yml up --build
#
# Then open http://localhost:8090, create a host in Settings, and use the
# generated per-agent Docker Compose setup on the target host. Do not add
# agent tokens to this hub compose file.

name: lumen

services:
  hub:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.hub
    image: lumen-hub:dev
    container_name: lumen-hub
    ports:
      - "8090:8090"
    # Single source of truth for hub config: the repo-root .env. Path is
    # resolved relative to THIS compose file, so any CWD works (no --env-file
    # flag). Missing .env is OK; the Go binary falls back to its own defaults.
    env_file:
      - path: ../../.env
        required: false
    environment:
      # Container-only override — keep this so a native-tuned .env
      # (LUMEN_HUB_DB_PATH=./lumen.db) does not write inside the container FS.
      LUMEN_HUB_DB_PATH: "/data/lumen.db"
    volumes:
      - lumen-data:/data
    restart: unless-stopped

volumes:
  lumen-data:
