  <path d="M 12 32 a 20 20 0 0 1 40 0" stroke="#14b8a6" stroke-width="3" stroke-linecap="round" opacity="0.35"/>
  <!-- middle arc (medium pulse) -->
  <path d="M 18 32 a 14 14 0 0 1 28 0" stroke="#14b8a6" stroke-width="3" stroke-linecap="round" opacity="0.65"/>
  <!-- inner arc (strong pulse) -->
