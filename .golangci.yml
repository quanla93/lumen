# golangci-lint v2 config.
#
# Philosophy: we run the "standard" linter set (errcheck, govet,
# ineffassign, staticcheck, unused) and whitelist a small number of
# idioms that those linters complain about but that the project
# considers correct.

version: "2"

linters:
  default: standard

  exclusions:
    rules:
      # `defer X.Close()` is idiomatic Go — the close happens on a path
      # where the caller can't usefully act on the error (response
      # body already read, file already written, connection already
      # dying, DB shutting down). Whitelisting at the source-pattern
      # level rather than per-file keeps the config short and signals
      # the intent clearly.
      - linters: [errcheck]
        source: '\.Close\(\)$'

      # `defer tx.Rollback()` is the standard Go SQL idiom — if Commit
      # already ran, Rollback returns sql.ErrTxDone and there's nothing
      # the caller can usefully do with it. Same justification as Close.
      - linters: [errcheck]
        source: '\.Rollback\(\)$'

      # QF1001 = "could apply De Morgan's law". Stylistic — the
      # negated-positive form is often more readable when the positive
      # case is the obvious thing being checked (e.g. allowlist
      # character checks). Not a bug.
      - linters: [staticcheck]
        text: "QF1001"

run:
  timeout: 5m
