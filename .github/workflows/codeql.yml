name: CodeQL

# Manual-only until either:
#   (a) the repo flips to public (CodeQL is free on public repos), or
#   (b) GitHub Advanced Security is enabled on this private repo.
#
# Until then, the analyze step ends with "Code scanning is not
# enabled for this repository" — a repo-settings failure, not a
# code failure. Running on every push painted the Actions tab red
# without telling us anything actionable; switching to manual
# dispatch keeps the workflow file around for the day code
# scanning becomes available.
#
# To run on demand: gh workflow run CodeQL  (or click "Run workflow"
# in the GitHub UI). To re-enable on push, add the `push:` /
# `pull_request:` / `schedule:` triggers back.
on:
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: [go, javascript-typescript]
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
      - uses: github/codeql-action/autobuild@v3
      - uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
