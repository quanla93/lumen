name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-go:
    name: Lint (Go)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true
      - name: golangci-lint
        # v7 is the first release of the action that supports
        # golangci-lint v2.x. v6 + v2 errors with
        # "invalid version string ... golangci-lint v2 is not supported".
        uses: golangci/golangci-lint-action@v7
        with:
          # Pinned so a future golangci-lint release can't break CI on
          # a quiet day. Bump when adopting a new lint rule.
          version: v2.12.2
          args: --timeout=5m

  lint-web:
    name: Lint (Web + Docs)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run lint
      - run: pnpm run typecheck
      - run: pnpm --filter web test

  test-go:
    name: Test (Go)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true
      - run: go test -race -coverprofile=coverage.out ./...
      - uses: codecov/codecov-action@v4
        with:
          files: coverage.out
          fail_ci_if_error: false

  build:
    name: Build (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - linux-amd64
          - linux-arm64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: make build-${{ matrix.target }}
      - name: Check binary size
        run: |
          HUB_SIZE=$(stat -c%s dist/lumen-hub-${{ matrix.target }})
          AGENT_SIZE=$(stat -c%s dist/lumen-agent-${{ matrix.target }})
          echo "Hub: $HUB_SIZE bytes"
          echo "Agent: $AGENT_SIZE bytes"
          # Fail if hub > 30MB or agent > 20MB
          test $HUB_SIZE -lt 31457280 || (echo "Hub binary exceeds 30MB"; exit 1)
          test $AGENT_SIZE -lt 20971520 || (echo "Agent binary exceeds 20MB"; exit 1)
      - uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.target }}
          path: dist/
          retention-days: 7

  docker:
    name: Docker build smoke (${{ matrix.image }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image:
          - hub
          - agent
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build ${{ matrix.image }} image (amd64 only, no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/docker/Dockerfile.${{ matrix.image }}
          platforms: linux/amd64
          push: false
          # No cache-from/cache-to here — buildx auto-uses inline layer
          # cache from the previous step's local builder.
          tags: lumen-${{ matrix.image }}:ci

  benchmark:
    name: Benchmark (RAM + throughput)
    runs-on: ubuntu-latest
    # Only on PR + only if at least one benchmark exists. The grep
    # short-circuits the job entirely on repos that haven't added
    # `func Benchmark*` yet (the current state of Lumen pre-v0.1).
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - name: Skip if no benchmarks defined
        id: probe
        run: |
          if grep -rqE "^func Benchmark" --include="*_test.go" .; then
            echo "has_bench=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_bench=false" >> "$GITHUB_OUTPUT"
          fi
      - if: steps.probe.outputs.has_bench == 'true'
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true
      - if: steps.probe.outputs.has_bench == 'true'
        run: go test -bench=. -benchmem -run=^$ ./internal/hub/... | tee bench.txt
      - if: steps.probe.outputs.has_bench == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: benchmark
          path: bench.txt

  # Catches a class of regressions where a Settings tab (or any other
  # top-level web feature) is added to web/src but the bundle that
  # actually ships via //go:embed in internal/hub/web/web.go is not
  # rebuilt. Greps target string literals + i18n keys (which Vite
  # keeps verbatim in the emitted JS), not React component names
  # (Vite minifies those into short identifiers).
  bundle-freshness:
    name: Web bundle freshness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter web build
      - name: Verify expected source symbols are in the bundle
        run: |
          set -e
          BUNDLE=$(ls web/dist/assets/index-*.js)
          echo "Checking $BUNDLE"
          # Add a new entry whenever a top-level feature lands a new
          # Settings tab or login form. Each SYM is a string literal
          # that must appear in the minified bundle — React function
          # names get mangled by Vite, so we grep for the user-visible
          # copy the component renders.
          for SYM in \
            "settings.tabs.sso" \
            "settings.tabs.saml" \
            "alerts.tabs.maintenance" \
            "Sign in with SAML" \
            "onboarding.title" \
            "onboarding.replay" \
            "onboarding.step1.title" \
            "settings.onboardingReplayTitle" \
            "passkeys.title" \
            "Sign in with passkey" \
          ; do
            if ! grep -qF "$SYM" "$BUNDLE"; then
              echo "::error::bundle missing $SYM — run 'pnpm build:web' locally and verify the source change is present."
              exit 1
            fi
            echo "  ✓ found $SYM"
          done
