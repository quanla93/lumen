name: Release

# Runs on every annotated `v*` tag (e.g. v0.1.0, v0.2.0-rc1).
#
# What it produces:
#   • Hub tarballs (linux-amd64 + linux-arm64) attached to the GitHub Release
#   • lumen-agent binaries (linux-amd64 + linux-arm64) attached to the Release
#   • Multi-arch ghcr.io/<owner>/lumen-hub:<version> + :latest
#   • Multi-arch ghcr.io/<owner>/lumen-agent:<version> + :latest
#
# Permissions:
#   contents: write   — needed to create the GitHub Release
#   packages: write   — needed to push to ghcr.io as ${{ github.actor }}
#
# arm64 build path: amd64 builds native on ubuntu-latest; arm64 uses
# QEMU emulation via docker/setup-qemu-action. Total release time
# ~10-15min. armv7 stays dropped (CI matrix only ships amd64 + arm64
# per CHANGELOG v0.4.7). Must stay in sync with allowedBinaries in
# internal/hub/install/install.go.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ─── 1. Build all binaries + tarballs on a single Linux runner ──────────────
  binaries:
    name: Build binaries + tarballs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # `git describe` needs full history for VERSION

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: Install web deps
        run: pnpm install --frozen-lockfile

      - name: Build web bundle (embedded into the hub binary)
        run: make build-web

      - name: Build hub + agent (linux/amd64 + linux/arm64)
        run: |
          make build-linux-amd64
          make build-linux-arm64

      - name: Stage hub tarballs (binary + install.sh + unit file)
        run: |
          make release-hub-tarball-amd64
          make release-hub-tarball-arm64

      - uses: actions/upload-artifact@v4
        with:
          name: release-assets
          path: |
            dist/lumen-hub-linux-amd64.tar.gz
            dist/lumen-hub-linux-arm64.tar.gz
            dist/lumen-agent-linux-amd64
            dist/lumen-agent-linux-arm64
          retention-days: 7

  # ─── 2. Build + push multi-arch container images to ghcr.io ─────────────────
  images:
    name: Push images to ghcr.io
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      # QEMU registers handlers for cross-arch emulation so a single
      # buildx invocation can produce both linux/amd64 (native) and
      # linux/arm64 (emulated) layers on the same ubuntu-latest runner.
      - uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64
      - uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: ver
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build + push hub image (multi-arch)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/docker/Dockerfile.hub
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            VERSION=${{ steps.ver.outputs.VERSION }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/lumen-hub:${{ steps.ver.outputs.VERSION }}
            ghcr.io/${{ github.repository_owner }}/lumen-hub:latest

      - name: Build + push agent image (multi-arch)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/docker/Dockerfile.agent
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            VERSION=${{ steps.ver.outputs.VERSION }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/lumen-agent:${{ steps.ver.outputs.VERSION }}
            ghcr.io/${{ github.repository_owner }}/lumen-agent:latest

  # ─── 3. Create the GitHub Release with binaries + tarballs attached ─────────
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [binaries, images]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          name: release-assets
          path: dist/

      - name: Generate release notes
        id: notes
        run: |
          PREV_TAG=$(git tag --sort=-v:refname | grep -v "^${GITHUB_REF_NAME}$" | head -1 || true)
          if [ -n "$PREV_TAG" ]; then
            RANGE="${PREV_TAG}..${GITHUB_REF_NAME}"
            echo "Changes since $PREV_TAG:" > /tmp/notes.md
          else
            RANGE="${GITHUB_REF_NAME}"
            echo "Initial release." > /tmp/notes.md
          fi
          echo "" >> /tmp/notes.md
          git log --pretty=format:"- %s" "$RANGE" --no-merges >> /tmp/notes.md || true
          echo "" >> /tmp/notes.md
          echo "" >> /tmp/notes.md
          echo "## Container images (multi-arch: linux/amd64 + linux/arm64)" >> /tmp/notes.md
          echo '```' >> /tmp/notes.md
          echo "ghcr.io/${{ github.repository_owner }}/lumen-hub:${GITHUB_REF_NAME#v}" >> /tmp/notes.md
          echo "ghcr.io/${{ github.repository_owner }}/lumen-agent:${GITHUB_REF_NAME#v}" >> /tmp/notes.md
          echo '```' >> /tmp/notes.md

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body_path: /tmp/notes.md
          files: |
            dist/lumen-hub-linux-amd64.tar.gz
            dist/lumen-hub-linux-arm64.tar.gz
            dist/lumen-agent-linux-amd64
            dist/lumen-agent-linux-arm64
          fail_on_unmatched_files: true
          # Tag may be a pre-release if it has a -rc/-alpha/-beta suffix.
          prerelease: ${{ contains(github.ref_name, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
