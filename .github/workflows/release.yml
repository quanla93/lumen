name: Release

# Runs on every annotated `v*` tag (e.g. v0.1.0, v0.2.0-rc1).
#
# What it produces (amd64 only — see "ARM removed" note below):
#   • Hub tarball (linux-amd64) attached to the GitHub Release
#   • lumen-agent binary (linux-amd64) attached to the Release
#   • ghcr.io/<owner>/lumen-hub:<version> + :latest
#   • ghcr.io/<owner>/lumen-agent:<version> + :latest
#
# Permissions:
#   contents: write   — needed to create the GitHub Release
#   packages: write   — needed to push to ghcr.io as ${{ github.actor }}
#
# ARM removed: arm64 + armv7 builds were dropped because the operator
# fleet is 100% x86 (Proxmox + VPS). QEMU emulation for armv7 took
# 25+ min and arm64 ~15 min on free runners — total release was ~40min.
# amd64-only release is ~3-5 min. To bring ARM back: re-add platforms
# to the buildx steps (and switch arm64 to ubuntu-24.04-arm native
# runner to avoid QEMU). See git log for the removal commit.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ─── 1. Build all binaries + tarballs on a single Linux runner ──────────────
  binaries:
    name: Build binaries + tarballs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # `git describe` needs full history for VERSION

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: Install web deps
        run: pnpm install --frozen-lockfile

      - name: Build web bundle (embedded into the hub binary)
        run: make build-web

      - name: Build hub + agent (linux/amd64)
        run: make build-linux-amd64

      - name: Stage hub tarball (binary + install.sh + unit file)
        run: make release-hub-tarball-amd64

      - uses: actions/upload-artifact@v4
        with:
          name: release-assets
          path: |
            dist/lumen-hub-linux-amd64.tar.gz
            dist/lumen-agent-linux-amd64
          retention-days: 7

  # ─── 2. Build + push multi-arch container images to ghcr.io ─────────────────
  images:
    name: Push images to ghcr.io
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      # No QEMU needed — amd64-only build runs native on ubuntu-latest.
      - uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: ver
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build + push hub image (amd64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/docker/Dockerfile.hub
          platforms: linux/amd64
          push: true
          build-args: |
            VERSION=${{ steps.ver.outputs.VERSION }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/lumen-hub:${{ steps.ver.outputs.VERSION }}
            ghcr.io/${{ github.repository_owner }}/lumen-hub:latest

      - name: Build + push agent image (amd64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/docker/Dockerfile.agent
          platforms: linux/amd64
          push: true
          build-args: |
            VERSION=${{ steps.ver.outputs.VERSION }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/lumen-agent:${{ steps.ver.outputs.VERSION }}
            ghcr.io/${{ github.repository_owner }}/lumen-agent:latest

  # ─── 3. Create the GitHub Release with binaries + tarballs attached ─────────
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [binaries, images]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          name: release-assets
          path: dist/

      - name: Generate release notes
        id: notes
        run: |
          PREV_TAG=$(git tag --sort=-v:refname | grep -v "^${GITHUB_REF_NAME}$" | head -1 || true)
          if [ -n "$PREV_TAG" ]; then
            RANGE="${PREV_TAG}..${GITHUB_REF_NAME}"
            echo "Changes since $PREV_TAG:" > /tmp/notes.md
          else
            RANGE="${GITHUB_REF_NAME}"
            echo "Initial release." > /tmp/notes.md
          fi
          echo "" >> /tmp/notes.md
          git log --pretty=format:"- %s" "$RANGE" --no-merges >> /tmp/notes.md || true
          echo "" >> /tmp/notes.md
          echo "" >> /tmp/notes.md
          echo "## Container images" >> /tmp/notes.md
          echo '```' >> /tmp/notes.md
          echo "ghcr.io/${{ github.repository_owner }}/lumen-hub:${GITHUB_REF_NAME#v}" >> /tmp/notes.md
          echo "ghcr.io/${{ github.repository_owner }}/lumen-agent:${GITHUB_REF_NAME#v}" >> /tmp/notes.md
          echo '```' >> /tmp/notes.md

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body_path: /tmp/notes.md
          files: |
            dist/lumen-hub-linux-amd64.tar.gz
            dist/lumen-agent-linux-amd64
          fail_on_unmatched_files: true
          # Tag may be a pre-release if it has a -rc/-alpha/-beta suffix.
          prerelease: ${{ contains(github.ref_name, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
