openapi: 3.1.0
info:
  title: Lumen Hub API
  version: 0.0.0-phase1
  summary: Pre-v0.1 spike — only the endpoints implemented so far.
  description: |
    Lumen hub REST + WebSocket API.

    Phase 1 spike: only the three endpoints below are wired. Phase 2 adds
    auth (Argon2id + JWT), host CRUD, the `/api/hosts` query API, and
    versions everything under `/api/v1/`.

    Import this file into Postman, Insomnia, Bruno, Hoppscotch, Stoplight,
    or any OpenAPI-aware tool. For the WebSocket endpoint (`/api/stream`),
    use a dedicated WS client — most REST tools don't drive WS from OpenAPI.
  license:
    name: MIT
    identifier: MIT
  contact:
    name: Lumen
    url: https://github.com/quanla93/lumen

servers:
  - url: http://localhost:8090
    description: Local dev hub (default `LUMEN_HUB_ADDR`).
  - url: https://lumen.example.com
    description: Replace with your deployed hub URL.

tags:
  - name: health
    description: Liveness probes.
  - name: ingest
    description: Agent → hub metric push.
  - name: stream
    description: Hub → client WebSocket fan-out (documented for reference).
  - name: auth
    description: First-admin registration, login, logout, session lookup.
  - name: hosts
    description: Per-host bearer-token CRUD. Session-protected.

paths:
  /healthz:
    get:
      tags: [health]
      operationId: getHealth
      summary: Liveness probe.
      description: Returns 200 OK as long as the hub process is up.
      responses:
        "200":
          description: Hub is alive.
          content:
            application/json:
              schema:
                type: object
                required: [status]
                properties:
                  status:
                    type: string
                    example: ok

  /api/ingest:
    post:
      tags: [ingest]
      operationId: postIngest
      summary: Push one metric snapshot for a host.
      description: |
        Agents call this every `LUMEN_AGENT_INTERVAL` (default 5s) with the
        latest host sample. Every accepted snapshot is held in the
        in-memory store (hot path for `/api/stream`) and appended to the
        SQLite `snapshots` table (history archive).

        Strict bearer-token auth: requests without a valid `Authorization:
        Bearer <token>` are rejected 401. The token's host name (looked
        up server-side) overrides whatever the agent put in `body.host`.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IngestRequest"
            examples:
              full:
                summary: Phase 2 envelope (CPU + memory + disk + load)
                value:
                  host: pve-01
                  ts: "2026-05-25T07:09:53Z"
                  cpu_pct: 12.3
                  ram_pct: 68.0
                  swap_pct: 23.6
                  disk_pct: 73.1
                  load1: 0.42
                  load5: 0.31
                  load15: 0.28
              cpuOnly:
                summary: Minimal envelope (zero-value metric fields allowed)
                value:
                  host: pve-01
                  ts: "2026-05-25T07:09:53Z"
                  cpu_pct: 12.3
      responses:
        "204":
          description: Accepted, no body.
        "400":
          description: Validation failed (missing host, zero ts, cpu_pct out of [0,100], unknown fields).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              examples:
                missingHost:
                  value: { error: "host required" }
                badCpu:
                  value: { error: "cpu_pct out of [0,100]" }
        "401":
          description: |
            Missing or invalid `Authorization: Bearer <token>` header.
            Mint a token in Settings → Hosts and set it as
            `LUMEN_AGENT_TOKEN` in the agent's env.

  /api/setup-status:
    get:
      tags: [auth]
      operationId: getSetupStatus
      summary: Whether an admin user has been created yet.
      description: UI hits this on first paint to decide between the register or login form.
      responses:
        "200":
          description: OK.
          content:
            application/json:
              schema:
                type: object
                required: [admin_exists]
                properties:
                  admin_exists: { type: boolean }

  /api/register:
    post:
      tags: [auth]
      operationId: postRegister
      summary: Create the first admin (one-shot).
      description: |
        Allowed only while the users table is empty. After the first user
        is created, this endpoint returns 403 forever.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CredentialsRequest" }
      responses:
        "201":
          description: Admin created; session cookie set.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/User" }
        "400":
          description: Username or password failed validation.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "403":
          description: Setup already complete.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /api/login:
    post:
      tags: [auth]
      operationId: postLogin
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CredentialsRequest" }
      responses:
        "200":
          description: OK; session cookie set.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/User" }
        "401":
          description: Invalid credentials.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /api/logout:
    post:
      tags: [auth]
      operationId: postLogout
      summary: Clear the session cookie. Idempotent.
      responses:
        "204":
          description: Logged out.

  /api/me:
    get:
      tags: [auth]
      operationId: getMe
      summary: Current session user. 401 without a valid cookie.
      security:
        - sessionCookie: []
      responses:
        "200":
          description: OK.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/User" }
        "401":
          description: No session.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /api/hosts:
    get:
      tags: [hosts]
      operationId: listHosts
      security: [{ sessionCookie: [] }]
      responses:
        "200":
          description: All hosts ordered by name.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Host" }
    post:
      tags: [hosts]
      operationId: createHost
      security: [{ sessionCookie: [] }]
      summary: Mint a new host + bearer token.
      description: |
        The plaintext token is returned **exactly once** in the response.
        The hub stores only its SHA-256 hash. If the user navigates away
        without copying it, they must call rotate to get a new one.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              additionalProperties: false
              properties:
                name:
                  type: string
                  maxLength: 64
                  example: pve-01
      responses:
        "201":
          description: Created.
          content:
            application/json:
              schema:
                type: object
                required: [host, token]
                properties:
                  host:  { $ref: "#/components/schemas/Host" }
                  token: { type: string, example: "lum_abcdef0123456789..." }
        "400":
          description: Invalid name or name already taken.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /api/hosts/{id}:
    delete:
      tags: [hosts]
      operationId: deleteHost
      security: [{ sessionCookie: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer, format: int64 }
      responses:
        "204": { description: Deleted. Past snapshots stay for audit. }
        "404": { description: Host not found. }

  /api/hosts/{id}/rotate:
    post:
      tags: [hosts]
      operationId: rotateHostToken
      security: [{ sessionCookie: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer, format: int64 }
      responses:
        "200":
          description: New token (one-shot).
          content:
            application/json:
              schema:
                type: object
                required: [token]
                properties:
                  token: { type: string }
        "404": { description: Host not found. }

  /api/hosts/{id}/metrics:
    get:
      tags: [hosts]
      operationId: getHostMetrics
      security: [{ sessionCookie: [] }]
      summary: Downsampled metric history for one host.
      description: |
        Returns per-bucket averages from the snapshots table between
        `from` and `to` (exclusive). Each bucket spans `step_seconds`.
        Empty buckets are omitted; widen `step` or shrink the window if
        the response would exceed 2000 points.

        Defaults: `to` = now, `from` = to - 1h, `step` auto-picked from
        the window (≈120 buckets). Min step is 5s; max window is 7 days.
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer, format: int64 }
        - in: query
          name: from
          required: false
          schema: { type: string, format: date-time }
          description: RFC3339. Default = to - 1h.
        - in: query
          name: to
          required: false
          schema: { type: string, format: date-time }
          description: RFC3339. Default = now.
        - in: query
          name: step
          required: false
          schema: { type: string, example: "30s" }
          description: Go duration. Default = auto (window / 120 rounded to a friendly tick).
      responses:
        "200":
          description: Metric history.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MetricsResponse" }
        "400":
          description: Invalid query (bad RFC3339, from >= to, window > 7d, points > 2000).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "404": { description: Host not found. }

  /api/stream:
    get:
      tags: [stream]
      operationId: getStream
      summary: WebSocket — pushes the current per-host snapshot every interval.
      description: |
        Upgrade this request to a WebSocket. The hub then:

        1. Sends the current snapshot immediately (initial frame).
        2. Re-sends every `LUMEN_HUB_STREAM_INTERVAL` (default 5s).

        Frames are JSON arrays of `HostSnapshot`. Phase 2 adds diffing /
        per-host subscription.

        Test from CLI (Node 22+):
        ```
        node -e "const ws=new WebSocket('ws://localhost:8090/api/stream');ws.onmessage=e=>console.log(e.data);"
        ```
      responses:
        "101":
          description: Switching Protocols — WebSocket upgrade succeeded.
        "400":
          description: Upgrade failed (missing/invalid WS headers).

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: opaque
      description: |
        `Authorization: Bearer <token>`. Per-host token minted when the host
        is created (Phase 2 hosts CRUD slice — not yet enforced by ingest).
    sessionCookie:
      type: apiKey
      in: cookie
      name: lumen_session
      description: |
        HttpOnly cookie holding an HMAC-SHA256 JWT (claim `uid`, 30-day TTL).
        Issued by /api/register and /api/login; cleared by /api/logout.

  schemas:
    CredentialsRequest:
      type: object
      required: [username, password]
      additionalProperties: false
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 32
          example: admin
        password:
          type: string
          minLength: 8
          format: password
          example: correcthorsebattery

    User:
      type: object
      required: [id, username, created_at]
      properties:
        id:         { type: integer, format: int64, example: 1 }
        username:   { type: string,  example: admin }
        created_at: { type: string,  format: date-time }

    Host:
      type: object
      required: [id, name, created_at]
      properties:
        id:           { type: integer, format: int64, example: 1 }
        name:         { type: string, example: pve-01 }
        created_at:   { type: string, format: date-time }
        last_seen_at:
          type: string
          format: date-time
          nullable: true
          description: Updated by /api/ingest when a token-authenticated POST arrives.

    IngestRequest:
      type: object
      required: [host, ts]
      additionalProperties: false
      description: |
        Metric fields are zero-default — a sample with only host+ts is valid
        (the hub will store zeros for missing metrics). Agents that fail to
        collect one metric still ship the rest so the dashboard's
        last-update timestamp moves forward.
      properties:
        host:
          type: string
          minLength: 1
          example: pve-01
          description: Host identifier (defaults to `os.Hostname()` in the agent).
        ts:
          type: string
          format: date-time
          example: "2026-05-25T07:09:53Z"
          description: RFC3339 sample time (UTC recommended).
        cpu_pct:    { type: number, format: double, minimum: 0, maximum: 100, example: 12.34, description: CPU usage % across all cores for the past interval. }
        cpu_per_core:
          type: array
          items: { type: number, format: double, minimum: 0, maximum: 100 }
          maxItems: 256
          example: [10.2, 14.7, 8.0, 22.1]
          description: |
            Per-logical-core CPU%. Optional — included when the agent
            can collect it. NOT persisted to SQLite; lives only in the
            in-memory store for the live WS stream.
        ram_pct:    { type: number, format: double, minimum: 0, maximum: 100, example: 68.0,  description: RAM used % (gopsutil virtual memory). }
        swap_pct:   { type: number, format: double, minimum: 0, maximum: 100, example: 23.6,  description: Swap used %; 0 if the host has no swap or the lookup failed. }
        disk_pct:   { type: number, format: double, minimum: 0, maximum: 100, example: 73.1,  description: Used % of the filesystem at `LUMEN_AGENT_DISK_PATH` (default `/` or `C:\\`). }
        load1:      { type: number, format: double, minimum: 0, example: 0.42, description: 1-minute load average. 0 if unsupported on this OS. }
        load5:      { type: number, format: double, minimum: 0, example: 0.31, description: 5-minute load average. }
        load15:     { type: number, format: double, minimum: 0, example: 0.28, description: 15-minute load average. }
        net_rx_bps: { type: number, format: double, minimum: 0, example: 12450.5, description: Network bytes/sec received (summed across all NICs since last tick). 0 on the first tick after agent start. }
        net_tx_bps: { type: number, format: double, minimum: 0, example: 8120.0,  description: Network bytes/sec transmitted. }
        disk_r_bps: { type: number, format: double, minimum: 0, example: 5242880, description: Block-device bytes/sec read (summed across all devices). }
        disk_w_bps: { type: number, format: double, minimum: 0, example: 1048576, description: Block-device bytes/sec written. }
        temp_c:     { type: number, format: double, minimum: -50, maximum: 150, example: 47.0, description: Hottest CPU-package temperature in °C; 0 when no sensor is available (macOS without root, Windows without WMI, containers). }

    HostSnapshot:
      type: object
      required: [host, ts]
      properties:
        host:         { type: string, example: pve-01 }
        ts:           { type: string, format: date-time }
        cpu_pct:      { type: number, format: double, minimum: 0, maximum: 100 }
        cpu_per_core:
          type: array
          items: { type: number, format: double, minimum: 0, maximum: 100 }
          description: Live per-logical-core CPU%. Omitted if the agent didn't collect it.
        ram_pct:      { type: number, format: double, minimum: 0, maximum: 100 }
        swap_pct:     { type: number, format: double, minimum: 0, maximum: 100 }
        disk_pct:     { type: number, format: double, minimum: 0, maximum: 100 }
        load1:        { type: number, format: double, minimum: 0 }
        load5:        { type: number, format: double, minimum: 0 }
        load15:       { type: number, format: double, minimum: 0 }
        net_rx_bps:   { type: number, format: double, minimum: 0 }
        net_tx_bps:   { type: number, format: double, minimum: 0 }
        disk_r_bps:   { type: number, format: double, minimum: 0 }
        disk_w_bps:   { type: number, format: double, minimum: 0 }
        temp_c:       { type: number, format: double, minimum: -50, maximum: 150 }
        cpu_series:
          type: array
          description: |
            Recent CPU% history kept by the hub's per-host ring (up to 120
            samples, oldest first). Lets clients draw a sparkline on first
            connect without a cold-start gap. Omitted if empty.
          items: { type: number, format: double, minimum: 0, maximum: 100 }

    MetricPoint:
      type: object
      required: [ts, cpu_pct, ram_pct, swap_pct, disk_pct, load1, load5, load15, net_rx_bps, net_tx_bps, disk_r_bps, disk_w_bps, temp_c]
      properties:
        ts:         { type: string, format: date-time, description: Bucket start (UTC). }
        cpu_pct:    { type: number, format: double, minimum: 0, maximum: 100 }
        ram_pct:    { type: number, format: double, minimum: 0, maximum: 100 }
        swap_pct:   { type: number, format: double, minimum: 0, maximum: 100 }
        disk_pct:   { type: number, format: double, minimum: 0, maximum: 100 }
        load1:      { type: number, format: double, minimum: 0 }
        load5:      { type: number, format: double, minimum: 0 }
        load15:     { type: number, format: double, minimum: 0 }
        net_rx_bps: { type: number, format: double, minimum: 0 }
        net_tx_bps: { type: number, format: double, minimum: 0 }
        disk_r_bps: { type: number, format: double, minimum: 0 }
        disk_w_bps: { type: number, format: double, minimum: 0 }
        temp_c:     { type: number, format: double, minimum: -50, maximum: 150 }

    MetricsResponse:
      type: object
      required: [host, from, to, step_seconds, points]
      properties:
        host:         { type: string, example: pve-01 }
        from:         { type: string, format: date-time }
        to:           { type: string, format: date-time }
        step_seconds: { type: integer, format: int64, example: 30 }
        points:
          type: array
          items: { $ref: "#/components/schemas/MetricPoint" }

    Error:
      type: object
      required: [error]
      properties:
        error:
          type: string
          example: host required
